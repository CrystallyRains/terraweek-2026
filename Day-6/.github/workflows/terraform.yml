name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: Format, Validate, Test, Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      # Fails the build if any .tf file isn't formatted correctly
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # No backend access needed to validate syntax/config
      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      # Plan-based native tests - no AWS credentials required
      - name: Terraform Test
        run: terraform test

      # Static security scan of the Terraform config
      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      # Real plan against AWS - only runs with credentials configured as
      # repo secrets (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY). Skipped
      # automatically on forks / PRs without secret access.
      - name: Configure AWS Credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        if: github.event_name == 'push'
        run: terraform init

      - name: Terraform Plan
        if: github.event_name == 'push'
        run: terraform plan -no-color
